<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f7ff"/>
    </linearGradient>
    <linearGradient id="dev" x1="0" x2="1">
      <stop offset="0" stop-color="#0d6ddf"/>
      <stop offset="1" stop-color="#2c8bef"/>
    </linearGradient>
    <linearGradient id="qa" x1="0" x2="1">
      <stop offset="0" stop-color="#0f8a5f"/>
      <stop offset="1" stop-color="#49b77f"/>
    </linearGradient>
    <linearGradient id="gov" x1="0" x2="1">
      <stop offset="0" stop-color="#6548c7"/>
      <stop offset="1" stop-color="#8b6ae8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#12345c" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1769d6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#14935d"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#704fd4"/>
    </marker>
    <style>
      .title{font:800 44px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#0b1733;letter-spacing:1px}
      .sub{font:600 18px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#51657f}
      .sectionTitle{font:800 26px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .sectionSub{font:600 15px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#eaf4ff}
      .h{font:800 18px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#12264a}
      .p{font:600 14px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#344761}
      .tiny{font:600 12px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#66758c}
      .card{fill:#fff;stroke:#c8dafa;stroke-width:1.4;filter:url(#shadow)}
      .devCard{fill:#f7fbff;stroke:#2376da;stroke-width:1.5}
      .qaCard{fill:#f7fff9;stroke:#209568;stroke-width:1.5}
      .govCard{fill:#fbf8ff;stroke:#7c5bdb;stroke-width:1.5}
      .warnCard{fill:#fff8f2;stroke:#ef8b3a;stroke-width:1.5}
      .rejectCard{fill:#fff6f6;stroke:#d94848;stroke-width:1.5}
      .line{stroke:#1769d6;stroke-width:2.4;fill:none;marker-end:url(#arrowBlue)}
      .gline{stroke:#14935d;stroke-width:2.4;fill:none;marker-end:url(#arrowGreen)}
      .pline{stroke:#704fd4;stroke-width:2.2;fill:none;marker-end:url(#arrowPurple);stroke-dasharray:7 6}
      .label{font:800 15px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#174478}
      .footer{font:700 16px "PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#223854}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="474" cy="46" r="4" fill="#1769d6"/>
  <line x1="480" y1="46" x2="560" y2="46" stroke="#1769d6" stroke-width="2"/>
  <circle cx="560" cy="46" r="4" fill="#1769d6"/>
  <text x="590" y="62" class="title">CR-Vigil 提测准入治理闭环</text>
  <circle cx="1040" cy="46" r="4" fill="#1769d6"/>
  <line x1="1046" y1="46" x2="1126" y2="46" stroke="#1769d6" stroke-width="2"/>
  <circle cx="1126" cy="46" r="4" fill="#1769d6"/>
  <text x="490" y="96" class="sub">开发提供证据，测试执行准入，系统沉淀规则与趋势。代码 CR 责任在开发侧。</text>

  <rect x="52" y="126" width="420" height="720" rx="18" class="card"/>
  <rect x="52" y="126" width="420" height="92" rx="18" fill="url(#dev)"/>
  <text x="88" y="166" class="sectionTitle">1 开发证据包</text>
  <text x="88" y="196" class="sectionSub">材料写在 MR 描述或评论里，不单独口头交付</text>

  <rect x="88" y="252" width="336" height="92" rx="12" class="devCard"/>
  <circle cx="126" cy="290" r="17" fill="#1769d6"/>
  <rect x="112" y="308" width="28" height="22" rx="11" fill="#1769d6"/>
  <text x="164" y="285" class="h">AI 辅助声明</text>
  <text x="164" y="313" class="p">是否使用、占比、工具、主要模块</text>

  <rect x="88" y="374" width="336" height="92" rx="12" class="devCard"/>
  <path d="M122 396 h33 l18 18 v39 h-51z" fill="none" stroke="#1769d6" stroke-width="4"/>
  <path d="M155 396 v18 h18" fill="none" stroke="#1769d6" stroke-width="4"/>
  <text x="164" y="407" class="h">开发自检声明</text>
  <text x="164" y="435" class="p">边界异常、本地自测、无阻断缺陷</text>

  <rect x="88" y="496" width="336" height="92" rx="12" class="devCard"/>
  <path d="M123 524 l12 12 l28 -32" fill="none" stroke="#1769d6" stroke-width="5"/>
  <path d="M121 556 h58" stroke="#1769d6" stroke-width="4"/>
  <text x="164" y="529" class="h">CI 证明或 N/A</text>
  <text x="164" y="557" class="p">流水线链接；无 CI 项目需说明</text>

  <rect x="88" y="618" width="336" height="112" rx="12" class="devCard"/>
  <path d="M121 646 h42 m-42 24 h42 m-42 24 h42" stroke="#1769d6" stroke-width="4"/>
  <text x="164" y="647" class="h">开发侧 Code Review</text>
  <text x="164" y="675" class="p">非作者资深 Reviewer</text>
  <text x="164" y="700" class="tiny">实质性评论 + 12 项 Checklist + 批准链接</text>

  <rect x="104" y="768" width="304" height="44" rx="22" fill="#eaf3ff" stroke="#8bb9f5"/>
  <text x="132" y="796" class="label">输出：一个材料完整、可追溯的 MR</text>

  <rect x="530" y="126" width="540" height="720" rx="18" class="card"/>
  <rect x="530" y="126" width="540" height="92" rx="18" fill="url(#qa)"/>
  <text x="566" y="166" class="sectionTitle">2 测试准入门</text>
  <text x="566" y="196" class="sectionSub">测试只做准入校验，不替代开发 CR，不给缺材料 MR 放行</text>

  <rect x="582" y="252" width="180" height="78" rx="12" class="qaCard"/>
  <text x="624" y="284" class="h">输入 MR 链接</text>
  <text x="612" y="312" class="p">测试执行 Skill</text>
  <rect x="838" y="252" width="180" height="78" rx="12" class="qaCard"/>
  <text x="876" y="284" class="h">GitLab 采集</text>
  <text x="868" y="312" class="p">MR / CI / 评论 / 审批</text>
  <path d="M762 291 H838" class="gline"/>

  <rect x="602" y="374" width="416" height="86" rx="14" class="warnCard"/>
  <text x="648" y="405" class="h">先问一个硬问题：MR 内材料齐全吗？</text>
  <text x="648" y="434" class="p">缺 AI 声明、开发 CR、自检声明或必要证据 → 直接 REJECTED</text>
  <path d="M625 399 l20 36 h-40z" fill="#ef8b3a"/>
  <rect x="622" y="410" width="6" height="14" rx="3" fill="#fff"/>
  <circle cx="625" cy="430" r="3" fill="#fff"/>
  <path d="M928 330 V374" class="gline"/>

  <rect x="582" y="506" width="130" height="94" rx="12" class="qaCard"/>
  <text x="620" y="535" class="h">Gate 1</text>
  <text x="612" y="561" class="p">CI 红线</text>
  <text x="607" y="584" class="tiny">无 CI 可 N/A</text>
  <rect x="736" y="506" width="150" height="94" rx="12" class="qaCard"/>
  <text x="775" y="535" class="h">Gate 2</text>
  <text x="756" y="561" class="p">AI 声明 + 开发 CR</text>
  <text x="771" y="584" class="tiny">核心责任门禁</text>
  <rect x="910" y="506" width="130" height="94" rx="12" class="qaCard"/>
  <text x="948" y="535" class="h">Gate 3</text>
  <text x="938" y="561" class="p">准入声明</text>
  <text x="939" y="584" class="tiny">材料齐全性</text>
  <path d="M712 553 H736" class="gline"/>
  <path d="M886 553 H910" class="gline"/>
  <path d="M810 460 V506" class="gline"/>

  <path d="M810 642 l90 66 l-90 66 l-90 -66 z" fill="#fff" stroke="#14935d" stroke-width="2"/>
  <text x="768" y="703" class="h">准入判定</text>
  <text x="758" y="730" class="p">排除 N/A 后评估</text>
  <path d="M975 600 V708 H900" class="gline"/>
  <rect x="580" y="770" width="126" height="54" rx="12" fill="#eefbf3" stroke="#14935d"/>
  <text x="604" y="804" class="label">ADMITTED</text>
  <rect x="735" y="770" width="150" height="54" rx="12" fill="#fff9ef" stroke="#ef8b3a"/>
  <text x="759" y="804" class="label">CONDITIONAL</text>
  <rect x="914" y="770" width="126" height="54" rx="12" class="rejectCard"/>
  <text x="939" y="804" class="label">REJECTED</text>
  <path d="M766 746 L684 770" class="gline"/>
  <path d="M810 774 V770" class="gline"/>
  <path d="M854 746 L934 770" class="gline"/>

  <rect x="1128" y="126" width="420" height="720" rx="18" class="card"/>
  <rect x="1128" y="126" width="420" height="92" rx="18" fill="url(#gov)"/>
  <text x="1164" y="166" class="sectionTitle">3 治理沉淀闭环</text>
  <text x="1164" y="196" class="sectionSub">让一次准入判断变成后续规则、模板和趋势资产</text>

  <rect x="1176" y="256" width="324" height="86" rx="12" class="govCard"/>
  <ellipse cx="1217" cy="289" rx="18" ry="8" fill="#704fd4"/>
  <path d="M1199 289 v30 c0 6 36 6 36 0 v-30" fill="none" stroke="#704fd4" stroke-width="4"/>
  <text x="1260" y="289" class="h">pr-registry.json</text>
  <text x="1260" y="317" class="p">沉淀每个 MR 的门禁状态与历史</text>
  <rect x="1176" y="380" width="324" height="86" rx="12" class="govCard"/>
  <path d="M1205 402 h35 l18 18 v36 h-53z" fill="none" stroke="#704fd4" stroke-width="4"/>
  <path d="M1240 402 v18 h18" fill="none" stroke="#704fd4" stroke-width="4"/>
  <text x="1260" y="413" class="h">准入报告 / 日报 / 周报</text>
  <text x="1260" y="441" class="p">给测试晨会、团队复盘、管理升级使用</text>
  <rect x="1176" y="504" width="324" height="86" rx="12" class="govCard"/>
  <path d="M1218 526 a22 22 0 1 0 8 16" fill="none" stroke="#704fd4" stroke-width="5"/>
  <path d="M1232 520 v20 h-20" fill="none" stroke="#704fd4" stroke-width="5"/>
  <text x="1260" y="537" class="h">规则与模板持续优化</text>
  <text x="1260" y="565" class="p">gate-rules、README 模板、Checklist</text>
  <rect x="1176" y="628" width="324" height="102" rx="12" class="govCard"/>
  <text x="1210" y="663" class="h">复现违规升级</text>
  <text x="1210" y="692" class="p">第 1 次警告；第 2 次无效提测；第 3 次暂停提测权限</text>
  <path d="M1338 342 V380" class="pline"/>
  <path d="M1338 466 V504" class="pline"/>
  <path d="M1338 590 V628" class="pline"/>

  <path d="M424 790 C490 790 516 291 582 291" class="line"/>
  <path d="M1040 797 C1100 797 1110 423 1176 423" class="pline"/>
  <path d="M1176 554 C1080 554 1050 905 810 905 C552 905 476 780 408 780" class="pline"/>
  <text x="520" y="888" class="sub">反馈闭环：阻塞原因进入报告，报告推动模板、规则、CI 命名和团队流程迭代</text>

  <rect x="52" y="886" width="1496" height="70" rx="14" fill="#eef6ff" stroke="#9cc4fa"/>
  <circle cx="91" cy="921" r="18" fill="#1769d6"/>
  <text x="86" y="928" font-family="Arial" font-size="26" font-weight="800" fill="#fff">i</text>
  <text x="126" y="915" class="footer">关键原则：MR 可以是唯一入口，但不能是唯一材料；开发对代码 CR 和自检负责，测试对准入规则执行负责。</text>
  <text x="126" y="940" class="footer">Gate 1 可因无 CI 标记 N/A；Gate 2 和 Gate 3 缺失时必须拒绝提测。</text>
</svg>
